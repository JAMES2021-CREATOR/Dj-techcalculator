<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR-DJtech</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
<div class="calculator">
    <h1>DJTECH<span>CALCULATOR</span></h1>
    <form action="">
        <input type="text" placeholder="0" id="inputbox">
    </form>
    <div class="pad">
      
        <div class="">
            <button  class="special">AC</button>
            <button  class="special">DEL</button>
            <button  class="special">%</button>
            <button class="special">/</button>
        </div>
        <div class="">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="special">*</button>
        </div>
        <div class="">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="special">-</button>
        </div>
        <div class="">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="special">+</button>
        </div>
        <div class="">
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="special">=</button>
        </div>
    </div>
</div><script src="sricpt.js"></script>

</body>
</html>
